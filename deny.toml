# cargo-deny configuration (NFR-5: license/advisory checks).

[advisories]
# Fail the build on any known-vulnerable dependency.
version = 2
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2017-0008: the `serial` crate is unmaintained (last release 2017). It
# is pulled in transitively by `portable-pty` 0.8.1 (the SRS §6-blessed PTY
# crate), which uses it for serial-port PTY support. This is an
# "unmaintained" notice, not a security vulnerability, and we never call into
# `serial` ourselves; replacing portable-pty is out of scope for v0.1. Tracked
# for revisit when portable-pty drops the dependency.
#
# RUSTSEC-2024-0436: `paste` is unmaintained (no safe upgrade exists per the
# advisory). Pulled in transitively by `ratatui` 0.26.3 (FR-3's TUI engine)
# for its macro-generated widget code; we never depend on `paste` directly.
# Tracked for revisit on the next ratatui upgrade.
#
# RUSTSEC-2026-0009: `time` <0.3.47 can exhaust the stack when *parsing*
# attacker-controlled input of unbounded length. The fixed release (0.3.47)
# declares rust-version 1.88, which conflicts with the workspace MSRV of 1.75
# (Cargo.toml `rust-version`; CI builds --locked on exactly that toolchain),
# so `time` is held at 0.3.41 — the newest MSRV-compatible release. Exposure
# is minimal: hh parses RFC3339 timestamps only from newline-bounded JSONL
# transcript lines written locally by Claude Code (adapter::ts_ms_from_iso);
# there is no network input (NFR-2) and no unbounded parse. Revisit when the
# MSRV policy is next bumped (>=1.88 lets `cargo update -p time` close this).
ignore = ["RUSTSEC-2017-0008", "RUSTSEC-2024-0436", "RUSTSEC-2026-0009"]

[licenses]
# Halfhand is Apache-2.0 (SRS §1). Allow permissive licenses compatible with
# Apache-2.0 distribution; copyleft (GPL/AGPL) and "unencumbered" must be
# reviewed.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    # MPL-2.0 is weak (file-level) copyleft from `option-ext`, a transitive dep
    # of `directories` (SRS §6) used by hh-core. We do not modify any MPL-2.0
    # file, so the source-disclosure obligation never triggers; it is
    # compatible with Apache-2.0 distribution. Reviewed and accepted for v0.1.
    "MPL-2.0",
]
# Confidence threshold for license detection.
confidence-threshold = 0.8

[bans]
# Detect duplicate dependencies; warn rather than deny to avoid blocking on
# transitive duplicates we do not control.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
# NFR-2: no network at runtime, and we do not want unknown registries in the
# build graph either.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []