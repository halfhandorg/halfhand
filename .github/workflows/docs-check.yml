name: docs-check

# "Examples must be real" guard (CLAUDE.md v1.0.0 addendum): build `hh` once,
# then execute the Quickstart commands against a throwaway data dir and assert
# each exits 0 with the expected substring. Catches docs that drift from the
# real CLI before they ship.
#
# The Quickstart uses `claude` as the example agent; `claude` is not installed
# on CI, so this job substitutes `echo hello` (any command works for `hh run`)
# while still exercising the exact `hh` subcommands the docs show.

on:
  pull_request:
    paths:
      - "docs/**"
      - "STABILITY.md"
      - "SECURITY.md"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quickstart-doctest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin hh

      - name: Run Quickstart commands against a temp data dir
        shell: bash
        run: |
          set -euo pipefail
          export HH="$PWD/target/release/hh"
          export DATA="$(mktemp -d)"
          export HH_DATA_DIR="$DATA"
          # Isolate config too (don't read a real ~/.config/halfhand/config.toml).
          export HOME="$DATA"
          export XDG_CONFIG_HOME="$DATA"

          step() { echo "::group::$*"; "$@"; echo "::endgroup::"; }

          # hh run -- <cmd>  (docs use `claude`; any command records)
          step "$HH" run -- echo hello

          # hh list
          out="$("$HH" list)"
          echo "$out"
          echo "$out" | grep -qi "echo" || { echo "list missing the session row"; exit 1; }

          # hh inspect last
          step "$HH" inspect last

          # hh inspect last --json  (must be valid JSON)
          "$HH" inspect last --json | jq -e . >/dev/null

          # hh stats
          step "$HH" stats

          # hh export last --out <file>  (always redacted by default)
          step "$HH" export last --out "$DATA/session.json"
          test -s "$DATA/session.json"

          # hh replay last --web  (non-interactive HTML; no TTY needed)
          web="$("$HH" replay last --web)"
          echo "$web"
          test -f "$web"

          # hh completions bash
          "$HH" completions bash | grep -q "_hh()"

          # hh --version reports the version + git sha
          "$HH" --version | grep -Eq "halfhand|hh"

          echo "all quickstart commands verified"
          rm -rf "$DATA"