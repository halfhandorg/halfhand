name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # NFR-2: no network. Keep toolchain updates pinned via the rust-toolchain
  # file rather than fetching latest at runtime.
  CARGO_UNSTABLE_SPARSE_REGISTRY: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Reads the MSRV straight from the workspace `rust-version` (CLAUDE.md v1.0.0
  # addendum) so the `test` matrix's `msrv` leg can never silently drift from
  # what Cargo.toml declares — hardcoding "1.75" a second time in this file
  # would just be another place for the two to disagree.
  msrv-version:
    name: read MSRV from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          v=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          test -n "$v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

  # Windows is a fully supported platform, not build-only (promoted from the
  # former `build-windows` build-only job): {ubuntu, macos, windows} x
  # {stable, msrv} is the full CI matrix.
  test:
    name: test (${{ matrix.os }}, ${{ matrix.rust }})
    needs: msrv-version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, msrv]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: resolve toolchain
        id: toolchain
        shell: bash
        run: |
          if [ "${{ matrix.rust }}" = "msrv" ]; then
            echo "version=${{ needs.msrv-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=stable" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.toolchain.outputs.version }}
      - name: cargo test --workspace
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Serialize on Windows only: `cargo test`'s default parallelism
            # spawns multiple `hh.exe` processes concurrently, each opening
            # its own ConPTY child. ConPTY delivers Ctrl+C by enumerating
            # "processes in the same console process group as the ConPTY
            # host" (see docs/platforms.md's PTY section) — with several
            # such host processes alive at once on one shared runner
            # console, one process's signal handling can spuriously reach
            # an unrelated sibling's child, killing it with
            # STATUS_CONTROL_C_EXIT (surfaced here as exit code 255).
            # Serializing means at most one ConPTY-attached child is ever
            # alive, which sidesteps the cross-talk entirely.
            cargo test --workspace --locked -- --test-threads=1
          else
            cargo test --workspace --locked
          fi
      # NFR-2 enforcement: the binary must link no HTTP client crate. We list
      # the tree and grep for known offenders; failure here means someone added
      # a network dependency. `shell: bash` because the default shell on
      # windows-latest is PowerShell, which doesn't understand `!`/pipe-negate.
      - name: no-network-crate check
        shell: bash
        run: |
          cargo tree --workspace -e features --depth 1 > tree.txt
          ! grep -Ei '^(ureq|reqwest|hyper|isahc|attohttpc|minreq|surf) ' tree.txt

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # EmbarkStudios/cargo-deny-action ships its own cargo-deny 0.19 (and
      # cargo) in the action image, so no rust-toolchain step is needed.
      # The action assembles: `cargo-deny --manifest-path ./Cargo.toml
      # <arguments> <command> <command-arguments>`. `arguments` holds global
      # flags (default `--all-features`); the `check` categories go in
      # `command-arguments`. Passing `--workspace` earlier failed because it
      # landed in the wrong slot / isn't a `check` arg — cargo-deny already
      # checks all workspace members via the manifest path.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: advisories licenses bans sources

  coverage:
    name: coverage (hh-core >= 80% lines, report-only elsewhere)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      # hh-core is the storage/blob/event layer with the property + fuzz
      # coverage this session added — it gates the build. hh-record/hh (PTY,
      # signals, terminal) are much harder to exercise headlessly in CI, so
      # they're report-only for now rather than blocking on a floor they
      # can't realistically hit without a real TTY.
      - name: cargo llvm-cov (hh-core, fail under 80% lines)
        run: cargo llvm-cov --package hh-core --locked --fail-under-lines 80
      - name: cargo llvm-cov (workspace, report only)
        run: cargo llvm-cov --workspace --locked --summary-only
        continue-on-error: true

  semver-checks:
    name: cargo-semver-checks (hh-core)
    runs-on: ubuntu-latest
    steps:
      # hh-core has never been published to crates.io, so semver-checks has no
      # registry baseline to diff against — full history + an explicit
      # `--baseline-rev` against main compares this branch's API to main's
      # instead (a no-op pass on main itself).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      # hh-core's public API is a real contract now: adapters (Codex, etc.)
      # implement its `Adapter` trait, and the v1.0.0 addendum requires CLI
      # flags/--json/DB schema/exit codes/env vars to be additive-only. This
      # extends that discipline to hh-core's Rust API surface.
      #
      # `--release-type minor` is required: hh-core's Cargo.toml version never
      # bumps per-PR, so current == baseline version and semver-checks cannot
      # infer what to check — verified locally that *without* this flag it
      # silently runs 0 of 253 lints and always reports "no update required"
      # (looks like a pass, isn't one). `minor` means "additions are fine,
      # breakage is not" — exactly CLAUDE.md's additive-only rule.
      - name: cargo semver-checks check-release -p hh-core
        run: |
          git fetch origin main
          cargo semver-checks check-release -p hh-core --baseline-rev origin/main --release-type minor