name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # NFR-2: no network. Keep toolchain updates pinned via the rust-toolchain
  # file rather than fetching latest at runtime.
  CARGO_UNSTABLE_SPARSE_REGISTRY: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test --workspace
        run: cargo test --workspace --locked
      # NFR-2 enforcement: the binary must link no HTTP client crate. We list
      # the tree and grep for known offenders; failure here means someone added
      # a network dependency.
      - name: no-network-crate check
        run: |
          cargo tree --workspace -e features --depth 1 > tree.txt
          ! grep -Ei '^(ureq|reqwest|hyper|isahc|attohttpc|minreq|surf) ' tree.txt

  build-windows:
    name: build (windows, build-only per SRS §2.2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build --workspace
        run: cargo build --workspace --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # EmbarkStudios/cargo-deny-action ships its own cargo-deny 0.19 (and
      # cargo) in the action image, so no rust-toolchain step is needed.
      # The action assembles: `cargo-deny --manifest-path ./Cargo.toml
      # <arguments> <command> <command-arguments>`. `arguments` holds global
      # flags (default `--all-features`); the `check` categories go in
      # `command-arguments`. Passing `--workspace` earlier failed because it
      # landed in the wrong slot / isn't a `check` arg — cargo-deny already
      # checks all workspace members via the manifest path.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: advisories licenses bans sources

  coverage:
    name: coverage (hh-core >= 80% lines, report-only elsewhere)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      # hh-core is the storage/blob/event layer with the property + fuzz
      # coverage this session added — it gates the build. hh-record/hh (PTY,
      # signals, terminal) are much harder to exercise headlessly in CI, so
      # they're report-only for now rather than blocking on a floor they
      # can't realistically hit without a real TTY.
      - name: cargo llvm-cov (hh-core, fail under 80% lines)
        run: cargo llvm-cov --package hh-core --locked --fail-under-lines 80
      - name: cargo llvm-cov (workspace, report only)
        run: cargo llvm-cov --workspace --locked --summary-only
        continue-on-error: true

  semver-checks:
    name: cargo-semver-checks (hh-core)
    runs-on: ubuntu-latest
    steps:
      # hh-core has never been published to crates.io, so semver-checks has no
      # registry baseline to diff against — full history + an explicit
      # `--baseline-rev` against main compares this branch's API to main's
      # instead (a no-op pass on main itself).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      # hh-core's public API is a real contract now: adapters (Codex, etc.)
      # implement its `Adapter` trait, and the v1.0.0 addendum requires CLI
      # flags/--json/DB schema/exit codes/env vars to be additive-only. This
      # extends that discipline to hh-core's Rust API surface.
      - name: cargo semver-checks check-release -p hh-core
        run: |
          git fetch origin main
          cargo semver-checks check-release -p hh-core --baseline-rev origin/main