name: release

# Tag-triggered release: push a `v*` tag (e.g. `v0.1.0-beta.1`) to build
# release binaries for x86_64/aarch64 on macOS and Linux (musl where feasible),
# publish SHA-256 checksums, and upload everything to a GitHub Release.
#
# NFR-8: every binary embeds the git sha it was built from in `hh --version`
# via `HH_BUILD_SHA` (see `hh/build.rs`), so a release binary always reports
# the exact commit it was built from even when built inside a `cross` container
# where `.git` is not visible.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual trigger for re-building a release without re-tagging

permissions:
  contents: write # for creating the GitHub Release and uploading assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: GNU x86_64 is native on ubuntu; musl and aarch64 go through
          # `cross` (Docker) so the bundled SQLite C compiles against the right
          # sysroot/toolchain.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  cross: false, archive: tar.gz }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: true,  archive: tar.gz }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true,  archive: tar.gz }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: true, archive: tar.gz }
          # macOS: both targets build natively on an arm64 runner (Xcode
          # toolchain cross-compiles to x86_64; aarch64 is native).
          - { os: macos-14,      target: aarch64-apple-darwin,      cross: false, archive: tar.gz }
          - { os: macos-14,      target: x86_64-apple-darwin,       cross: false, archive: tar.gz }
    runs-on: ${{ matrix.os }}
    env:
      # Always embed the workflow's commit sha (the tagged commit) regardless
      # of whether `.git` is visible inside a `cross` container.
      HH_BUILD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked --version 0.2.5

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked -p halfhand --target ${{ matrix.target }}
          else
            cargo build --release --locked -p halfhand --target ${{ matrix.target }}
          fi

      - name: Stage binary + version + checksum
        shell: bash
        run: |
          set -euo pipefail
          # macOS ships `shasum`, not `sha256sum`; both emit "<hash>  <file>".
          cksum256() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          # Stage dir is named after the bare target (e.g. `aarch64-apple-darwin`);
          # the release job later flattens `stage/hh` → `hh-<target>` so the final
          # asset name has a single `hh-` prefix, not `hh-hh-<target>`.
          stage="${{ matrix.target }}"
          mkdir -p "$stage"
          bin="target/${{ matrix.target }}/release/hh"
          [ -f "$bin" ] || bin="target/release/hh" # native build falls here
          cp "$bin" "$stage/hh"
          # Record the embedded version string (NFR-8) alongside the binary so
          # the release notes can show what each artifact reports. Cross-built
          # foreign-arch binaries (e.g. aarch64-linux on an x86_64 runner) can't
          # be executed on the build host, so tolerate that — the checksum
          # below hashes file bytes and does not need to run the binary.
          "$stage/hh" --version > "$stage/version.txt" 2>&1 \
            || echo "hh ${{ matrix.target }} (built via cross; not runnable on build host)" > "$stage/version.txt"
          # Per-target checksum of the binary itself.
          (cd "$stage" && cksum256 hh > "hh-${{ matrix.target }}.sha256")
          tar -czf "$stage.tar.gz" "$stage"
          echo "ASSET=$stage.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: hh-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble checksums + release notes
        shell: bash
        run: |
          set -euo pipefail
          # macOS ships `shasum`, not `sha256sum`; both emit "<hash>  <file>".
          cksum256() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          mkdir -p release
          # Unpack every per-target tarball (each contains hh, version.txt,
          # hh-<target>.sha256 under a hh-<target>/ dir).
          for tgz in artifacts/*.tar.gz; do
            tar -xzf "$tgz" -C release
          done
          # Flatten: rename each target's binary + version to target-suffixed
          # names so GitHub Release assets don't collide (every binary is named
          # `hh`; GitHub requires unique asset names). Drop the per-target
          # .sha256 from the tarball — it references the pre-rename `hh` and
          # will be regenerated over the final filenames below.
          for d in release/*/; do
            t="$(basename "$d")"
            [ -f "$d/hh" ] && mv "$d/hh" "release/hh-$t"
            [ -f "$d/version.txt" ] && mv "$d/version.txt" "release/version-$t.txt"
            rm -rf "$d"
          done
          # Regenerate per-target checksums + a top-level SHA256SUMS over the
          # final, target-suffixed binary names.
          ( cd release && for bin in hh-*; do
              case "$bin" in *.sha256) continue ;; esac
              cksum256 "$bin" > "$bin.sha256"
            done
            : > SHA256SUMS
            for bin in hh-*; do
              case "$bin" in *.sha256) continue ;; esac
              cksum256 "$bin" >> SHA256SUMS
            done )
          # Artifact manifest: per-target version line + all checksums.
          {
            echo "# Halfhand ${{ github.ref_name }} — artifact manifest"
            echo
            for vf in release/version-*.txt; do
              t="$(basename "$vf" .txt)"; t="${t#version-}"
              printf '%s: ' "$t"; cat "$vf"
            done
            echo
            echo "## SHA-256 checksums"
            echo
            echo '```text'
            cat release/SHA256SUMS
            echo '```'
          } > release/ARTIFACTS.md
          ls -R release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            release/hh-*
            release/version-*.txt
            release/SHA256SUMS
            release/ARTIFACTS.md