# cargo-audit configuration.
#
# `cargo audit` is part of the 1.0 release audit (see CLAUDE.md / RELEASING.md).
# The three advisories below are "unmaintained"/"unsound" *warnings*, not
# exploitable vulnerabilities, and are already accepted/tracked in `deny.toml`
# (which is the authoritative gate in CI). They are listed here too so
# `cargo audit` exits cleanly (0 warnings) instead of re-surfacing them:
#
# - RUSTSEC-2017-0008 (`serial`, unmaintained): pulled transitively by
#   `portable-pty` 0.8.1 (SRS §6-blessed PTY crate) for serial-port PTY support.
#   We never call into `serial`. Revisit when portable-pty drops it.
# - RUSTSEC-2024-0436 (`paste`, unmaintained): pulled transitively by
#   `ratatui` 0.26.3 (FR-3 TUI engine) for macro-generated widget code. We
#   never depend on `paste` directly. Revisit on the next ratatui upgrade.
# - RUSTSEC-2026-0002 (`lru` IterMut unsound): cargo-audit flags the
#   transitive `lru` 0.12.5, but 0.12.5 is the *patched* release (cargo-deny
#   correctly does not flag it). Our direct `lru` dep is pinned `>=0.18`
#   (see `hh/Cargo.toml`), and we never use `IterMut`. Listed only to silence
#   cargo-audit's conservative over-reporting.
[advisories]
ignore = [
    "RUSTSEC-2017-0008",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0002",
]